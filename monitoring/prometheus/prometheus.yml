global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: admanager-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: admanager-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9100
