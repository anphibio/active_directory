name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: pip install -r api/requirements-dev.txt

      - name: Validate Python syntax
        run: python -m compileall api/app worker/app

      - name: Run API tests
        run: PYTHONPATH=api pytest api/tests

      - name: Run worker tests
        run: PYTHONPATH=worker pytest worker/tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - api
      - frontend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build

      - name: Login to registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and publish images
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME}"
          REPO_LOWER="$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')"
          docker tag activedirectory-api "${REGISTRY}/${REPO_LOWER}/api:${VERSION}"
          docker tag activedirectory-worker "${REGISTRY}/${REPO_LOWER}/worker:${VERSION}"
          docker tag activedirectory-frontend "${REGISTRY}/${REPO_LOWER}/frontend:${VERSION}"
          docker push "${REGISTRY}/${REPO_LOWER}/api:${VERSION}"
          docker push "${REGISTRY}/${REPO_LOWER}/worker:${VERSION}"
          docker push "${REGISTRY}/${REPO_LOWER}/frontend:${VERSION}"
